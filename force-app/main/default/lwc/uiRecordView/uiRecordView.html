<template>
    <div class="ui-recview">
        <header lwc:if={title} class="ui-recview__header">{title}</header>
        <lightning-record-view-form
            record-id={recordId}
            object-api-name={objectApiName}
        >
            <div class="ui-recview__grid" style={gridStyle}>
                <template for:each={fieldList} for:item="f">
                    <lightning-output-field
                        key={f}
                        field-name={f}
                    ></lightning-output-field>
                </template>
            </div>
        </lightning-record-view-form>
    </div>
</template>
