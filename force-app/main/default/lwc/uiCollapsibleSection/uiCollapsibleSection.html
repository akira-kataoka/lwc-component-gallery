<template>
    <div class="ui-collapse">
        <button
            class="ui-collapse__header"
            type="button"
            aria-expanded={isOpen}
            onclick={handleToggle}
        >
            <span class="ui-collapse__caret">{caret}</span>
            <span class="ui-collapse__title">{title}</span>
        </button>
        <div lwc:if={isOpen} class="ui-collapse__body">
            <slot></slot>
        </div>
    </div>
</template>
