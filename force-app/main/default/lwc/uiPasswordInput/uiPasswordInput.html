<template>
    <div class="ui-password">
        <label lwc:if={label} class="ui-password__label">{label}</label>
        <div class="ui-password__field">
            <input
                class="ui-password__input"
                type={fieldType}
                value={value}
                placeholder={placeholder}
                oninput={handleInput}
            />
            <button
                class="ui-password__toggle"
                type="button"
                title="表示切替"
                onclick={toggle}
            >
                {toggleIcon}
            </button>
        </div>
    </div>
</template>
