<template>
    <div class={rootClass}>
        <div class="ui-chat__bubble">
            <p class="ui-chat__text">{text}</p>
        </div>
        <div lwc:if={hasMeta} class="ui-chat__meta">
            <span lwc:if={author} class="ui-chat__author">{author}</span>
            <span lwc:if={time} class="ui-chat__time">{time}</span>
        </div>
    </div>
</template>
