<template>
    <div class="ui-chips">
        <template for:each={computedChips} for:item="chip">
            <button
                key={chip.value}
                class={chip.cssClass}
                type="button"
                data-value={chip.value}
                onclick={handleSelect}
            >

            </button>
        </template>
    </div>
</template>
